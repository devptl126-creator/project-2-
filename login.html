<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Masti Resort</title>
    <link rel="stylesheet" href="registerstyle.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="main">
        <!-- Header -->
        <div class="header">
            <h1><i class="fas fa-sunset"></i> Sunset Resort</h1>
            <nav>
                <a href="home.html">Home</a> |
                <a href="register.html">Register</a> |
                <a href="login.html" class="active">Login</a> |
            </nav>
        </div>

        <!-- Hero Section -->
        <section class="hero-section">
            <div class="hero-overlay"></div>
            <div class="hero-content">
                <h1 class="hero-title">Welcome Back</h1>
                <p class="hero-subtitle">Sign in to access your account</p>
            </div>
        </section>

        <!-- Main Content -->
        <main class="form-section">
            <div class="form-container login-container">
                
                <!-- Form Header -->
                <header class="form-header">
                    <div class="header-icon">
                        <i class="fas fa-shield-alt"></i>
                    </div>
                    <h2>Secure Login</h2>
                    <p>Enter your credentials to continue</p>
                </header>

                <!-- Demo Credentials (Static) -->
                <div class="demo-section">
                    <div class="demo-badge">
                        <i class="fas fa-star"></i>
                        <strong>Demo:</strong> test@sunset.com / demo123
                    </div>
                </div>

                <!-- Login Form -->
                <form action="login.php" method="POST" class="login-form">
                    
                    <!-- Email Field -->
                    <div class="field-group">
                        <label for="email">
                            <i class="fas fa-envelope"></i>
                            <span>Email Address</span>
                        </label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            placeholder="test@sunset.com" 
                            required 
                            autocomplete="email"
                        >
                    </div>

                    <!-- Password Field -->
                    <div class="field-group">
                        <label for="password">
                            <i class="fas fa-lock"></i>
                            <span>Password</span>
                        </label>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="demo123" 
                            required 
                            autocomplete="current-password"
                        >
                    </div>

                    <!-- Form Options -->
                    <div class="form-options">
                        <div class="checkbox-group">
                            <input type="checkbox" id="remember" name="remember">
                            <label for="remember">Remember me</label>
                        </div>
                        <a href="#" class="forgot-link">Forgot Password?</a>
                    </div>

                    <!-- FIXED: Submit Button (removed nested <a> tag) -->
                    <button type="submit" class="submit-btn">
                        <span class="btn-text">
                            <i class="fas fa-arrow-right"></i>
                            Sign In
                        </span>
                        <span class="btn-icon">
                            <i class="fas fa-sign-in-alt"></i>
                        </span>
                    </button>
                </form>

                <!-- Quick Actions -->
                <div class="quick-actions">
                    <div class="divider">
                        <span>or</span>
                    </div>
                    <a href="register.html" class="quick-btn register-btn">
                        <i class="fas fa-user-plus"></i>
                        Create Account
                    </a>
                    <a href="home.html" class="quick-btn guest-btn">
                        <i class="fas fa-door-open"></i>
                        Continue as Guest
                    </a>
                </div>

            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <div class="footer-content">
                <div class="footer-info">
                    <p>&copy; 2026 <strong>Masti Resort</strong></p>
                    <p>Luxury Beachfront | College Project</p>
                </div>
                <div class="footer-links">
                    <a href="#"><i class="fab fa-facebook-f"></i></a>
                    <a href="#"><i class="fab fa-instagram"></i></a>
                    <a href="#"><i class="fab fa-twitter"></i></a>
                </div>
            </div>
        </footer>
    </div>
</body>
</html>
